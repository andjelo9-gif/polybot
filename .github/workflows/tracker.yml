# Polls Polymarket for copy-bet alerts; state persists between runs via cache.
name: Polymarket tracker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tracker
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The cache is immutable per key, so each run saves under a unique key
      # and the next run restores the most recent one via the prefix match.
      - name: Restore tracker state
        uses: actions/cache/restore@v4
        with:
          path: tracker_state.json
          key: tracker-state-${{ github.run_id }}
          restore-keys: |
            tracker-state-

      - name: Install dependencies
        run: pip install requests

      - name: Run tracker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TZ: Europe/Lisbon
        run: python polymarket_tracker.py --once

      - name: Save tracker state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: tracker_state.json
          key: tracker-state-${{ github.run_id }}
